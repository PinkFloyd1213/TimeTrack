services:

  # ── Base de données MySQL ────────────────────────────────────────────────────
  db:
    image: mysql:8.0
    container_name: timetrack_db
    restart: unless-stopped
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --init-connect='SET NAMES utf8mb4'
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: timetrack
      MYSQL_USER: timetrack_user
      MYSQL_PASSWORD: timetrack_pass
    ports:
      - "3306:3306"   # Optionnel : accès direct depuis DBeaver / HeidiSQL
    volumes:
      - db_data:/var/lib/mysql
      - ./db/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 15

  # ── API PHP (simule Apache + PHP sur Plesk) ──────────────────────────────────
  php:
    build:
      context: ./docker/php
    container_name: timetrack_php
    restart: unless-stopped
    ports:
      - "8080:80"     # http://localhost:8080/api/auth.php
    volumes:
      - ./api:/var/www/html/api
      - ./data_migration:/var/www/html/data_migration:ro
    environment:
      DB_HOST: db
      DB_NAME: timetrack
      DB_USER: timetrack_user
      DB_PASS: timetrack_pass
      ALLOWED_ORIGINS: "http://localhost:5173"
    depends_on:
      db:
        condition: service_healthy

volumes:
  db_data:
