; ── Affichage des erreurs (mode développement) ──────────────────────────────
display_errors = On
display_startup_errors = On
error_reporting = E_ALL
log_errors = On

; ── Sessions PHP ─────────────────────────────────────────────────────────────
session.cookie_httponly = 1
session.cookie_samesite = Lax
session.cookie_secure = 0       ; 0 en dev HTTP, 1 en prod HTTPS
session.gc_maxlifetime = 86400  ; 24h
session.use_strict_mode = 1

; ── Encodage ─────────────────────────────────────────────────────────────────
default_charset = UTF-8
